<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Kalibrium logo">
  <!-- Kalibrium logo (placeholder MVP): fundo azul Ionic (#3880ff) com letra K estilizada branca.
       O grid 1024x1024 reserva uma area segura central de 80% (81..943) para uso como maskable.
       Troca deste SVG rerodar pwa-asset-generator (npm run generate:icons). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3880ff"/>
      <stop offset="1" stop-color="#1f5cd4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <!-- Letra K dentro da area segura 80% (centro 512,512, raio operacional ~410). -->
  <g fill="#ffffff" stroke="none">
    <!-- Haste vertical -->
    <rect x="300" y="240" width="110" height="544" rx="18"/>
    <!-- Diagonal superior -->
    <polygon points="410,500 690,240 760,300 480,548"/>
    <!-- Diagonal inferior -->
    <polygon points="480,476 760,740 690,800 410,560"/>
  </g>
  <!-- Ponto indicador (marca visual complementar, dentro area segura). -->
  <circle cx="740" cy="380" r="38" fill="#ffe066"/>
</svg>
